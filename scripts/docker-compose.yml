services:
  ollama:
    image: ollama/ollama:latest
    container_name: clx-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      # Corporate SSL inspection / custom CA certificates:
      # 1. Set CLX_CA_CERT_PATH to your corporate CA certificate file path
      #    Example: export CLX_CA_CERT_PATH=/path/to/corporate-ca.crt
      # 2. Uncomment the volume mount and environment lines below
      # 3. Run: docker compose up -d  (to recreate the container with certs)
      # - ${CLX_CA_CERT_PATH:-/dev/null}:/usr/local/share/ca-certificates/corporate-ca.crt:ro
    # environment:
    #   - SSL_CERT_FILE=/usr/local/share/ca-certificates/corporate-ca.crt
    restart: unless-stopped

    # GPU support for Linux (NVIDIA)
    # Uncomment the following lines if running on Linux with NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # Note: macOS Docker Desktop does not support GPU passthrough.
    # Ollama will run in CPU-only mode on macOS, which is sufficient for
    # qwen3:1.7b and qwen3-embedding:0.6b models.

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
    name: clx_ollama_data
