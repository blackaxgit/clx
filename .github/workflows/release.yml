# Release pipeline for CLX — builds macOS binaries and publishes a GitHub Release.
#
# Trigger:  push of any tag matching v* (e.g. v0.1.0, v1.2.3-rc1)
# Platforms:
#   macos-latest — Apple Silicon ARM64 (M-series, default since late 2024)
#   Apple Silicon only: Intel x86_64 macOS is unsupported from 0.8.0
#   (no prebuilt ONNX Runtime for the bge-reranker dependency).
#
# Jobs:
#   build   — compile release binaries and produce a signed tarball + SHA256
#   release — download the build artifact and attach it to a GitHub Release
#
# Permissions: only contents:write is needed; GITHUB_TOKEN is sufficient.

name: Release

on:
  push:
    tags:
      - "v*"

# Grant the workflow token permission to create releases and upload assets.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation for reproducible, hermetic release builds.
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # build: compile the workspace in release mode, package binaries, and upload
  # the tarball + checksum as Actions artifacts so the release job can attach them.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    # Native build on the free ARM64 runner (Apple Silicon only).
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — native build on ARM64 runner.
          # x86_64-apple-darwin is intentionally not built: the bge-reranker
          # dependency (fastembed -> ort-sys) ships no prebuilt ONNX Runtime
          # for Intel macOS, which Apple has EOL'd (macos-13 runners retired
          # Dec 2025). 0.8.0 ships Apple Silicon only.
          - arch: aarch64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache ~/.cargo/registry, ~/.cargo/git, and the target directory.
      # The cache key includes Cargo.lock so a lockfile change busts the cache.
      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Pre-build supply-chain security gates: RustSec advisories + policy enforcement
      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --quiet

      - name: Supply-chain gate — cargo audit (RustSec advisories)
        run: cargo audit

      - name: Supply-chain gate — cargo deny (licenses, sources, bans, advisories)
        run: cargo deny check

      # Build all three binary crates in a single workspace compile.
      # Cross-compiled binaries land in target/<target>/release/.
      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # Verify the produced binaries have the expected architecture.
      - name: Verify binary architecture
        run: |
          BINARY="target/${{ matrix.target }}/release/clx"
          file "$BINARY"
          file "$BINARY" | grep -q "arm64" || { echo "ERROR: binary is not arm64" >&2; exit 1; }

      # Bundle all three binaries and the pre-built install script into one tarball.
      # The tarball layout mirrors what scripts/package.sh produces locally:
      #
      #   clx-{arch}-apple-darwin/
      #     install.sh          ← drop-in installer (no Rust required)
      #     bin/
      #       clx
      #       clx-hook
      #       clx-mcp
      - name: Create distribution tarball
        run: |
          TARBALL_STEM="clx-${{ matrix.arch }}-apple-darwin"
          STAGE_DIR="${TARBALL_STEM}"
          BIN_DIR="target/${{ matrix.target }}/release"

          mkdir -p "${STAGE_DIR}/bin"

          # Copy the three binary crates.
          cp "${BIN_DIR}/clx"          "${STAGE_DIR}/bin/"
          cp "${BIN_DIR}/clx-hook"     "${STAGE_DIR}/bin/"
          cp "${BIN_DIR}/clx-mcp"      "${STAGE_DIR}/bin/"

          # Copy the installer script from the repository root.
          cp install.sh "${STAGE_DIR}/install.sh"
          chmod +x "${STAGE_DIR}/install.sh"

          # Reset timestamps to avoid "Can't restore time: Operation not permitted"
          # errors when Homebrew extracts on macOS with SIP enabled.
          find "${STAGE_DIR}" -exec touch -t 202601010000 {} +

          # Produce the tarball without extended attributes.
          tar --no-xattrs -czf "${TARBALL_STEM}.tar.gz" "${STAGE_DIR}"

          # SHA256 checksum — one file, no path prefix (matches standard tooling expectations).
          shasum -a 256 "${TARBALL_STEM}.tar.gz" > "${TARBALL_STEM}.tar.gz.sha256"

          echo "TARBALL_STEM=${TARBALL_STEM}" >> "$GITHUB_ENV"
          echo "Created ${TARBALL_STEM}.tar.gz"
          cat "${TARBALL_STEM}.tar.gz.sha256"

      # Generate Software Bill of Materials (SBOM) in CycloneDX format
      # The SBOM captures all direct and transitive dependencies at build time.
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --quiet

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --release --target ${{ matrix.target }} \
            -o "clx-${{ matrix.arch }}-apple-darwin.sbom.xml"
          echo "SBOM generated: clx-${{ matrix.arch }}-apple-darwin.sbom.xml"
          ls -lh "clx-${{ matrix.arch }}-apple-darwin.sbom.xml"

      # Generate build provenance attestation using GitHub's native SLSA provenance action.
      # This creates a cryptographically-verifiable attestation that this tarball was built
      # by this workflow, at this commit, with no external intervention.
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.TARBALL_STEM }}.tar.gz
          # Note: GitHub's default keyless Sigstore signing (OIDC) is used.
          # No long-lived signing keys are stored or transmitted.

      # Upload artefacts so the release job can download them.
      # Each matrix leg uploads to a uniquely named artifact to avoid collisions.
      # Includes: tarball, checksum, and SBOM.
      - name: Upload release artifacts (tarball, checksum, SBOM, attestation)
        uses: actions/upload-artifact@v4
        with:
          name: clx-${{ matrix.arch }}-apple-darwin
          path: |
            ${{ env.TARBALL_STEM }}.tar.gz
            ${{ env.TARBALL_STEM }}.tar.gz.sha256
            clx-${{ matrix.arch }}-apple-darwin.sbom.xml
          if-no-files-found: warn
          retention-days: 1

  # ---------------------------------------------------------------------------
  # release: collect artifacts from all build legs and publish a GitHub Release.
  # Runs after both matrix builds have completed successfully.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Checkout is needed for the tag context; softprops/action-gh-release reads
      # it for the tag name and auto-generated notes.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so release notes can reference the commit range.
          fetch-depth: 0

      # Download every artifact uploaded by the build matrix into ./artifacts/.
      # Each artifact lands in its own subdirectory keyed by the artifact name.
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Flatten the nested subdirectories so all files sit side-by-side
      # at release-assets/*.tar.gz, *.sha256, *.sbom.xml, etc.
      - name: Flatten artifact directories
        run: |
          find artifacts -type f | sort
          mkdir -p release-assets
          find artifacts -type f -exec mv {} release-assets/ \;
          echo "--- Release assets ---"
          ls -lh release-assets/
          echo "--- Artifact manifest ---"
          find release-assets -type f -exec sha256sum {} \;

      # Derive the human-readable version from the Git tag (strips the leading 'v').
      - name: Set release version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Publishing release for ${VERSION}"

      # Create the GitHub Release and attach all release assets.
      # Includes: tarballs, checksums, SBOMs, and build attestations.
      # generate_release_notes: true fills the body with a commit-range changelog
      # automatically generated by GitHub (no template required).
      - name: Create GitHub Release with supply-chain artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CLX ${{ env.RELEASE_VERSION }}"
          # Auto-generate the changelog from commits since the previous tag.
          generate_release_notes: true
          # Mark pre-release if the tag contains a hyphen (e.g. v1.0.0-rc1).
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
            release-assets/*.sbom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # update-homebrew: update the Homebrew tap formula after a successful release.
  # Downloads SHA256 checksums from the release, generates the formula, and
  # pushes it to the blackaxgit/homebrew-clx tap repository.
  # ---------------------------------------------------------------------------
  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    # Skip pre-releases — only update the tap for stable releases.
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: blackaxgit/homebrew-clx
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download checksums and generate formula
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          # Download the SHA256 checksum from the GitHub Release.
          # Apple Silicon only — see the build matrix comment for why
          # x86_64-apple-darwin is not produced.
          curl -fsSL \
            "https://github.com/blackaxgit/clx/releases/download/${TAG}/clx-aarch64-apple-darwin.tar.gz.sha256" \
            -o "clx-aarch64.sha256"

          ARM_SHA=$(awk '{print $1}' clx-aarch64.sha256)

          echo "Version: ${VERSION}"
          echo "ARM SHA256: ${ARM_SHA}"

          # Generate the formula with correct 2-space Ruby indentation.
          # The heredoc is indented to satisfy YAML block scalar rules;
          # sed strips the 10-space padding to produce clean Ruby.
          mkdir -p Formula
          sed 's/^          //' > Formula/clx.rb << '____FORMULA'
          # typed: false
          # frozen_string_literal: true

          class Clx < Formula
            desc "Intelligent command validation and context persistence for Claude Code"
            homepage "https://github.com/blackaxgit/clx"
            version "____VERSION____"
            license "MPL-2.0"

            # Apple Silicon only. Intel macOS is unsupported from 0.8.0
            # (no prebuilt ONNX Runtime for the bge-reranker dependency).
            on_macos do
              on_arm do
                url "https://github.com/blackaxgit/clx/releases/download/____TAG____/clx-aarch64-apple-darwin.tar.gz"
                sha256 "____ARM_SHA____"
              end
            end

            def install
              bin.install "bin/clx"
              bin.install "bin/clx-hook"
              bin.install "bin/clx-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/clx --version")
            end
          end
          ____FORMULA

          # Substitute placeholders with actual values.
          sed -i "s|____VERSION____|${VERSION}|g" Formula/clx.rb
          sed -i "s|____TAG____|${TAG}|g" Formula/clx.rb
          sed -i "s|____ARM_SHA____|${ARM_SHA}|g" Formula/clx.rb

      - name: Commit and push formula
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/clx.rb

          # No-op if the formula is unchanged (idempotent).
          if git diff --cached --quiet; then
            echo "No changes to formula — skipping commit."
            exit 0
          fi

          git commit -m "chore: update clx to ${VERSION}"
          git push
