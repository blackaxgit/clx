# release-plz configuration for CLX
# Docs: https://release-plz.dev/docs/config

# ---------------------------------------------------------------------------
# Workspace-level defaults (apply to all crates unless overridden)
# ---------------------------------------------------------------------------
[workspace]

# Do not publish to crates.io — CLX is distributed as binaries only.
publish = false

# Skip cargo package verification — CLX uses path-only workspace
# dependencies without version specifiers, which cargo package rejects.
publish_no_verify = true

# Derive versions from git tags, not the cargo registry.
# Required when publish = false (no registry to query).
git_only = true

# Do not create GitHub Releases from release-plz.
# The existing release.yml workflow handles GitHub Release creation
# via softprops/action-gh-release with build artifacts attached.
# Having both would create duplicate releases or race conditions.
git_release_enable = false

# Only release when the Release PR is merged, not on every push to main.
# release-plz detects this by checking if the latest commit is associated
# with a release-plz branch (prefix: release-plz-).
release_always = false

# Tag format: v0.2.0, v1.0.0, etc.
# Must match the existing release.yml trigger: tags: ["v*"]
# For workspaces, the default is "{{ package }}-v{{ version }}" which would
# produce tags like "clx-core-v0.2.0" — that would NOT trigger release.yml.
# Override to use the simple v-prefix format.
git_tag_name = "v{{ version }}"

# Skip semver compatibility checks (cargo-semver-checks).
# CLX crates are all binary/internal — no public library API to check.
semver_check = false

# Label the Release PR for easy identification in the PR list.
pr_labels = ["release"]

# Release PR branch prefix (default). Shown here for documentation.
# release_always = false depends on this prefix to detect release merges.
pr_branch_prefix = "release-plz-"

# Disable dependency updates in the release PR.
# Dependency updates should go through their own PRs (e.g., Dependabot).
dependencies_update = false

# ---------------------------------------------------------------------------
# Changelog configuration (uses git-cliff under the hood)
# ---------------------------------------------------------------------------
[changelog]
# Trim whitespace from generated changelog entries.
trim = true

# Protect breaking change commits from being filtered out.
protect_breaking_commits = true

# ---------------------------------------------------------------------------
# Package configuration: all 4 crates share a single version group
# ---------------------------------------------------------------------------

# When packages share a version_group, release-plz assigns them the same
# version — the highest calculated version among all packages in the group.
# This ensures clx, clx-core, clx-hook, and clx-mcp always have identical
# version numbers.

[[package]]
name = "clx-core"
version_group = "clx"
# All changelogs write to the single root CHANGELOG.md
changelog_path = "CHANGELOG.md"
# Include commits from all other crates in this changelog
changelog_include = ["clx-hook", "clx-mcp", "clx"]

[[package]]
name = "clx-hook"
version_group = "clx"
# Disable per-crate changelog; included in root CHANGELOG.md via clx-core
changelog_update = false

[[package]]
name = "clx-mcp"
version_group = "clx"
changelog_update = false

[[package]]
name = "clx"
version_group = "clx"
changelog_update = false
